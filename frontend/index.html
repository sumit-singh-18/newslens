<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NewsLens Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="root">
      <p style="font-family:system-ui,sans-serif;padding:24px;color:#64748b;font-size:14px;">
        Loading NewsLens… If nothing appears after a few seconds, open DevTools → Console for errors.
      </p>
    </div>
    <!-- #region agent log -->
    <script>
      (function () {
        var L = "http://127.0.0.1:7528/ingest/89d055b3-625f-4e57-9ed5-0d70b4272673";
        function send(msg, data, hid) {
          data = data || {};
          data.hypothesisId = hid;
          try {
            fetch(L, {
              method: "POST",
              headers: { "Content-Type": "application/json", "X-Debug-Session-Id": "974724" },
              body: JSON.stringify({ sessionId: "974724", location: "index.html:boot", message: msg, data: data, timestamp: Date.now() }),
            }).catch(function () {});
          } catch (e) {}
        }
        send("index.html: script-inlined", { hasRoot: !!document.getElementById("root") }, "H3");
        window.addEventListener("error", function (e) {
          send("window.error", { message: e.message, file: e.filename, line: e.lineno, col: e.colno }, "H2");
        });
        window.addEventListener("unhandledrejection", function (e) {
          var r = e.reason;
          send("unhandledrejection", { reason: r && (r.message || String(r)), stack: r && r.stack }, "H1");
        });
      })();
    </script>
    <!-- #endregion -->
    <script type="module" src="/bundle.js"></script>
  </body>
</html>
